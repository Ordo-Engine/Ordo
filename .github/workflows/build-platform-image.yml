name: Build Platform Image

# Builds the ordo-platform image (Dockerfile.platform) and pushes it to GHCR.
# The image contains BOTH binaries — `ordo-platform` (default entrypoint, :3001)
# and `ordo-platform-worker` — so the same tag serves the API and the worker job.
#
# ordo-server already has its own image (release.yml); this fills the gap for the
# control plane, which previously had no published image.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.platform'
      - '.github/workflows/build-platform-image.yml'
  workflow_dispatch:

concurrency:
  group: platform-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push ordo-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ordo-platform
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.platform
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
