name: Deploy Studio to Vercel

# Studio is a Vite SPA whose build compiles the Rust→WASM package (@ordo-engine/wasm),
# which Vercel's Node-only cloud build cannot do. So we build here (the runner has the
# Rust toolchain + wasm-pack), then ship the prebuilt output with `vercel deploy --prebuilt`.
#
# Required repo secrets:
#   VERCEL_TOKEN       — Vercel personal/team token
#   VERCEL_ORG_ID      — from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID  — from `.vercel/project.json` (project root = ordo-editor/apps/studio)
# The API base is configured in ordo-editor/apps/studio/vercel.json (rewrites /api/v1/* to
# the platform on Nomad), so no API URL needs to be injected at build time.

on:
  push:
    branches: [main]
    paths:
      - 'ordo-editor/apps/studio/**'
      - 'ordo-editor/packages/**'
      - 'crates/ordo-wasm/**'
      - 'crates/ordo-core/**'
      - '.github/workflows/deploy-studio.yml'
  workflow_dispatch:

concurrency:
  group: studio-vercel
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy Studio
    runs-on: ubuntu-latest
    environment:
      name: studio-production
      url: https://app.ordoengine.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust & WASM (Studio's build compiles @ordo-engine/wasm) ──────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Build the Studio ourselves — this runner has Rust + wasm-pack + pnpm, so the
      # monorepo install + Rust→WASM + vite build all work (Vercel's own `vercel build`
      # uses the dashboard's framework-default `vite build` and skips the workspace
      # install, so `vite` isn't found). We then ship a hand-assembled Build Output.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
        working-directory: ordo-editor

      - name: Build Studio (wasm + vite)
        run: pnpm --filter @ordo-engine/studio build
        working-directory: ordo-editor

      - name: Link Vercel project
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: ordo-editor/apps/studio
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Assemble the Build Output API (v3) from dist. `--prebuilt` ignores vercel.json,
      # so the /api/v1 proxy + SPA fallback must live in config.json.
      - name: Assemble prebuilt output
        working-directory: ordo-editor/apps/studio
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json <<'JSON'
          {
            "version": 3,
            "routes": [
              { "src": "/api/v1/(.*)", "dest": "https://api.ordoengine.com/api/v1/$1" },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          JSON

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: ordo-editor/apps/studio
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
