name: ordo

# ── Development Compose ───────────────────────────────────────────────────────
#
# Usage:
#   docker compose up -d          # start backends (detached)
#   docker compose logs -f        # follow logs
#   docker compose down           # stop + remove containers
#   docker compose down -v        # also wipe data volumes
#
# Then in a separate terminal:
#   cd ordo-editor && pnpm dev    # start Studio on :3002
#
# Architecture:
#   Studio (:3002) → [Vite proxy /api] → ordo-platform (:3001)
#                                              ↓ proxy /engine
#                                        ordo-server (internal :8080)
#
# ordo-server is NOT exposed to the host — ordo-platform is the single
# public backend endpoint.

services:

  # ── Rule engine (internal) ───────────────────────────────────────────────
  ordo-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No ports: block — ordo-server is internal only.
    # ordo-platform reaches it via the Docker network as http://ordo-server:8080
    environment:
      ORDO_HTTP_ADDR: "0.0.0.0:8080"
      ORDO_RULES_DIR: /data/rules
      ORDO_LOG_LEVEL: info
    volumes:
      - ordo-rules:/data/rules
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Platform gateway (public) ─────────────────────────────────────────────
  ordo-platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      ORDO_PLATFORM_ADDR: "0.0.0.0:3001"
      ORDO_PLATFORM_DIR: /data/platform
      ORDO_ENGINE_URL: "http://ordo-server:8080"
      ORDO_JWT_SECRET: "${ORDO_JWT_SECRET:-dev-secret-change-me-in-production-32c}"
      ORDO_JWT_EXPIRY_HOURS: "24"
      ORDO_PLATFORM_CORS_ORIGINS: "*"
      ORDO_LOG_LEVEL: info
    volumes:
      - ordo-platform:/data/platform
    depends_on:
      ordo-server:
        condition: service_healthy

volumes:
  ordo-rules:
  ordo-platform:
