# ─────────────────────────────────────────────────────────────────────────────
# Secret values for ordo-platform + ordo-platform-worker.
#
# !! CHANGE EVERY VALUE BELOW BEFORE DEPLOYING ANYWHERE REAL !!
#
# ORDO_JWT_SECRET MUST be >= 32 chars (the platform refuses to start otherwise)
# and MUST be a high-entropy random value — anyone who knows it can forge auth
# tokens for every tenant.
#
# Recommended production flow (do not commit real secrets):
#   kubectl -n ordo create secret generic ordo-platform \
#     --from-literal=ORDO_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=ORDO_DATABASE_URL="postgresql://ordo:STRONGPASS@ordo-postgres:5432/ordo_platform"
# ...or manage it via sealed-secrets / external-secrets / Vault and remove this
# placeholder from kustomization.yaml.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ordo-platform
  namespace: ordo
  labels:
    app.kubernetes.io/name: ordo-platform
    app.kubernetes.io/part-of: ordo
type: Opaque
stringData:
  ORDO_JWT_SECRET: "CHANGE_ME_to_a_random_32+_char_secret_value"
  # Keep the password here in sync with the postgres Secret
  # (dependencies/postgres.yaml) or your managed-Postgres credentials.
  ORDO_DATABASE_URL: "postgresql://ordo:ordo_dev_pass_CHANGE_ME@ordo-postgres:5432/ordo_platform"
  # Optional GitHub OAuth App credentials (leave empty to disable OAuth login).
  ORDO_GITHUB_CLIENT_ID: ""
  ORDO_GITHUB_CLIENT_SECRET: ""
