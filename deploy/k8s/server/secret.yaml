# ─────────────────────────────────────────────────────────────────────────────
# Secret values for ordo-server.
#
# !! CHANGE EVERY VALUE BELOW BEFORE DEPLOYING ANYWHERE REAL !!
#
# In production do NOT commit real secrets to git. Generate them out-of-band:
#   kubectl -n ordo create secret generic ordo-server \
#     --from-literal=ORDO_SERVER_TOKEN="$(openssl rand -hex 32)"
# or use a sealed-secrets / external-secrets / Vault operator and remove this
# placeholder file from kustomization.yaml.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ordo-server
  namespace: ordo
  labels:
    app.kubernetes.io/name: ordo-server
    app.kubernetes.io/part-of: ordo
type: Opaque
stringData:
  # Shared secret the server presents when registering with the platform.
  # Must match what the platform expects for this server.
  ORDO_SERVER_TOKEN: "CHANGE_ME_server_token"
